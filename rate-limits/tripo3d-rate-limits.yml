specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Tripo3D
providerId: tripo3d
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- 3D
- Generation
- API
- Mesh
- Rate Limiting
- Quotas
- Throttling
description: >-
  Tripo3D uses async task-based REST: submit a task and poll for completion. HTTP RPS limits
  are not publicly documented; quotas are bounded by account credit balance and
  concurrent-task caps tied to the Platform plan tier.
notes: Verify task concurrency cap with Tripo support for production volumes.
sources:
- https://platform.tripo3d.ai/docs/
responseCodes:
  throttled: 429
limits:
- name: Concurrent Tasks
  scope: account
  metric: concurrent_tasks
  limit: see Platform plan tier
- name: Credit Balance
  scope: account
  metric: credits
  limit: prepaid
- name: HTTP Requests
  scope: account
  metric: requests
  limit: not publicly documented
policies:
- name: Async Polling
  description: Submit task via POST, poll task GET endpoint until status reaches success.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
