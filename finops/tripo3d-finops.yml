meters:
- name: text_to_3d_tasks
  description: Text-to-3D generation tasks.
  unit: task
  aggregation: sum
  dimensions:
  - account
- name: image_to_3d_tasks
  description: Image-to-3D generation tasks.
  unit: task
  aggregation: sum
  dimensions:
  - account
- name: refinement_tasks
  description: Mesh refinement / retexture / rigging / animation tasks.
  unit: task
  aggregation: sum
  dimensions:
  - account
  - operation
- name: credits_purchased
  description: Prepaid Tripo platform credit purchases.
  unit: USD
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track credit drawdown per task type in Tripo platform billing dashboard.
- name: Allocation
  description: Tag tasks to consuming game / app / studio.
- name: Optimization
  description: Use Text-to-3D for drafts; reserve refinement / retexture only for final assets.
- name: Accountability
  description: Assign credit-budget owner per consuming product.
