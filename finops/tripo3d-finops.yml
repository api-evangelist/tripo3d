description: >-
  FOCUS-aligned FinOps view of Tripo3D. Tripo Platform bills API usage on a task-credit
  basis (separate from consumer subscriptions). Per-task credit costs vary by task type
  (text-to-3D, image-to-3D, refinement, retexture, rigging, animation).
notes: Track per-task credit consumption to attribute spend to creative workflows.
sources:
- https://platform.tripo3d.ai/docs/billing
- https://www.tripo3d.ai/api
- https://focus.finops.org/focus-specification/v1-3/
