name: Tripo3D
kind: company
description: >-
  Tripo3D (by VAST) is an AI 3D generation platform with text-to-3D, image-to-3D, mesh
  refinement, and texturing APIs producing game-ready 3D assets. The Tripo API uses an async
  task-based REST pattern at https://api.tripo3d.ai/v2/openapi/task. Authenticate with API
  key.
