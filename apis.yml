apis:
  - aid: tripo3d:platform
    name: Tripo3D API
    description: >-
      REST API for text-to-3D, image-to-3D, multi-image-to-3D, mesh refinement, retexturing,
      animation, and rigging. Async task-based pattern (POST /v2/openapi/task to submit, GET
      to poll) at https://api.tripo3d.ai. Documentation at https://platform.tripo3d.ai/docs/.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
